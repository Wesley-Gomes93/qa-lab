version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: qa-lab-db
    restart: always
    environment:
      POSTGRES_USER: qa
      POSTGRES_PASSWORD: qa123
      POSTGRES_DB: qalab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: