# QA Extended Lab – Newman (API) + axe (Acessibilidade)
# Testes independentes: APIs públicas (JSONPlaceholder) e URLs públicas
# Não precisa de PostgreSQL, backend nem frontend

name: QA Extended Lab

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]
  workflow_dispatch:

jobs:
  qa-extended-lab:
    name: Newman + axe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: qa-extended-lab/package-lock.json

      - name: Install deps
        run: cd qa-extended-lab && npm ci

      - name: Install Chromium
        run: cd qa-extended-lab && npx playwright install chromium

      - name: Run API tests (Newman)
        run: cd qa-extended-lab && npm run test:api

      - name: Run A11y tests (axe)
        run: cd qa-extended-lab && npm run test:a11y

      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: qa-extended-lab/api-tests/reports/*.html
          if-no-files-found: ignore

      - name: Upload A11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: qa-extended-lab/a11y-tests/reports/*.html
          if-no-files-found: ignore
