# QA Lab – Pipeline: lint (por pasta) → build → tests (Cypress + Playwright) → report
# Fluxo SDET: qualidade primeiro, feedback rápido
# Configs diferentes por pasta: frontend (Next.js), backend/tests/agents (flat config)
name: Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # permite rodar manualmente e faz os status checks aparecerem

jobs:
  lint-frontend:
    name: lint (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Lint frontend
        run: cd frontend && npm run lint

  lint-backend:
    name: lint (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Lint backend
        run: npm run lint:backend

  lint-tests:
    name: lint (tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Lint tests
        run: npm run lint:tests

  lint-agents:
    name: lint (agents)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Lint agents
        run: npm run lint:agents

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend, lint-tests, lint-agents]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: cd frontend && npm install --prefer-offline --no-audit

      - name: Build frontend
        run: cd frontend && npm run build

  tests:
    name: tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend && npm install --prefer-offline --no-audit
          cd ../backend && npm ci
          cd ../tests && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Start PostgreSQL
        run: |
          docker run -d --name qa-lab-db -e POSTGRES_USER=qa -e POSTGRES_PASSWORD=qa123 -e POSTGRES_DB=qalab -p 5432:5432 postgres:15
          sleep 3

      - name: Start API
        run: |
          cd backend && cp .env.example .env 2>/dev/null || true
          npm run dev &
          sleep 5
        env:
          DATABASE_URL: postgresql://qa:qa123@localhost:5432/qalab
          PORT: 4000

      - name: Start frontend
        run: |
          cd frontend && PORT=3000 npm run start &
          sleep 8

      - name: Run Cypress
        run: cd tests && npx cypress run --browser chrome 2>/dev/null || npx cypress run
        env:
          CYPRESS_BASE_URL: http://localhost:3000

      - name: Upload Cypress report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report
          path: tests/cypress/reports/
          if-no-files-found: ignore

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend && npm install --prefer-offline --no-audit
          cd ../backend && npm ci
          cd ../tests && npm ci

      - name: Install Playwright browsers
        run: cd tests && npx playwright install --with-deps chromium

      - name: Start PostgreSQL
        run: |
          docker run -d --name qa-lab-db -e POSTGRES_USER=qa -e POSTGRES_PASSWORD=qa123 -e POSTGRES_DB=qalab -p 5432:5432 postgres:15
          sleep 3

      - name: Start API
        run: |
          cd backend && cp .env.example .env 2>/dev/null || true
          npm run dev &
          sleep 5
        env:
          DATABASE_URL: postgresql://qa:qa123@localhost:5432/qalab
          PORT: 4000

      - name: Build and start frontend
        run: |
          cd frontend && npm run build
          PORT=3000 npm run start &
          sleep 10

      - name: Run Playwright
        run: cd tests && npx playwright test
        env:
          FRONTEND_URL: http://localhost:3000
          API_BASE_URL: http://localhost:4000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          if-no-files-found: ignore

  report:
    name: report
    runs-on: ubuntu-latest
    needs: [tests, e2e]
    if: always() && (needs.tests.result == 'success' || needs.e2e.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - name: Download Cypress report
        uses: actions/download-artifact@v4
        with:
          name: cypress-report
          path: tests/cypress/reports/
        continue-on-error: true

      - name: Download Playwright report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
        continue-on-error: true

      - name: Generate unified report
        run: cd tests && node scripts/generate-qa-report.js

      - name: Generate execution report (comparison, suites, history)
        run: cd tests && node scripts/execution-report.js --no-save
        continue-on-error: true

      - name: Upload QA Lab report
        uses: actions/upload-artifact@v4
        with:
          name: qa-lab-report
          path: tests/qa-lab-reports/

  # Job único para branch protection: basta exigir "ci" no Ruleset
  ci:
    name: ci
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend, lint-tests, lint-agents, build, tests, e2e]
    if: always() && needs.lint-frontend.result == 'success' && needs.lint-backend.result == 'success' && needs.lint-tests.result == 'success' && needs.lint-agents.result == 'success' && needs.build.result == 'success' && needs.tests.result == 'success' && needs.e2e.result == 'success'
    steps:
      - run: echo "All checks passed"
