# QA Lab – Pipeline: build, lint, tests, e2e
name: Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: cd frontend && npm install --prefer-offline --no-audit

      - name: Build frontend
        run: cd frontend && npm run build

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Lint frontend
        run: cd frontend && npm run lint

  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend && npm install --prefer-offline --no-audit
          cd ../backend && npm ci
          cd ../tests && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Start PostgreSQL
        run: |
          docker run -d --name qa-lab-db -e POSTGRES_USER=qa -e POSTGRES_PASSWORD=qa123 -e POSTGRES_DB=qalab -p 5432:5432 postgres:15
          sleep 3

      - name: Start API
        run: |
          cd backend && cp .env.example .env 2>/dev/null || true
          npm run dev &
          sleep 5
        env:
          DATABASE_URL: postgresql://qa:qa123@localhost:5432/qalab
          PORT: 4000

      - name: Start frontend
        run: |
          cd frontend && PORT=3000 npm run start &
          sleep 8

      - name: Run Cypress
        run: cd tests && npx cypress run --browser chrome 2>/dev/null || npx cypress run
        env:
          CYPRESS_BASE_URL: http://localhost:3000

      - name: Upload Cypress report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report
          path: tests/cypress/reports/
          if-no-files-found: ignore

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend && npm install --prefer-offline --no-audit
          cd ../backend && npm ci
          cd ../tests && npm ci

      - name: Install Playwright browsers
        run: cd tests && npx playwright install --with-deps chromium

      - name: Start PostgreSQL
        run: |
          docker run -d --name qa-lab-db -e POSTGRES_USER=qa -e POSTGRES_PASSWORD=qa123 -e POSTGRES_DB=qalab -p 5432:5432 postgres:15
          sleep 3

      - name: Start API
        run: |
          cd backend && cp .env.example .env 2>/dev/null || true
          npm run dev &
          sleep 5
        env:
          DATABASE_URL: postgresql://qa:qa123@localhost:5432/qalab
          PORT: 4000

      - name: Build and start frontend
        run: |
          cd frontend && npm run build
          PORT=3000 npm run start &
          sleep 10

      - name: Run Playwright
        run: cd tests && npx playwright test
        env:
          FRONTEND_URL: http://localhost:3000
          API_BASE_URL: http://localhost:4000

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          if-no-files-found: ignore
