# QA Lab API – OpenAPI 3.0
# Contrato da API para contract testing (validação de schema)

openapi: 3.0.3
info:
  title: QA Lab API
  description: API REST do QA Lab - registro, login, gestão de usuários
  version: 1.0.0

servers:
  - url: http://localhost:4000
    description: Local

paths:
  /health:
    get:
      summary: Healthcheck
      responses:
        '200':
          description: API e banco ok
          content:
            application/json:
              schema:
                type: object
                required: [status, db]
                properties:
                  status:
                    type: string
                    example: ok
                  db:
                    type: string
                    enum: [ok, error]
                  uptime:
                    type: number
                  metrics:
                    type: object
                    properties:
                      apiResponseTimeMs: { type: number }
                      authSuccessRate: { type: number }

  /auth/register:
    post:
      summary: Registrar usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '201':
          description: Usuário criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Campos obrigatórios ausentes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: E-mail já existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Login ok
          content:
            application/json:
              schema:
                type: object
                required: [token, user]
                properties:
                  token: { type: string }
                  user: { $ref: '#/components/schemas/User' }
                  isAdmin: { type: boolean }
        '400':
          description: Campos obrigatórios ausentes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{id}:
    get:
      summary: Buscar usuário por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Usuário encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    User:
      type: object
      required: [id, name, email]
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        idade: { type: [integer, 'null'] }
        ativo: { type: boolean }
        created_at: { type: string }
        updated_at: { type: string }
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
